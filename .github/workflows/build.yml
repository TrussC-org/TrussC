name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Uses of [[deprecated]] TrussC API in the repo's own sources
  # (core/examples/tests, all jobs incl. web/android) fail the build
  # (GCC/Clang only; see core/CMakeLists.txt + trussc_app.cmake).
  # User projects never set this.
  TC_DEPRECATED_ERRORS: 1

jobs:
  # Path-based change detector. Emits docs_only=true when EVERY file in the diff
  # is documentation (any *.md, or anything under docs/ — prose + doc tooling).
  # The heavy build jobs gate on this so a docs-only change skips the ~20min
  # compile matrix while the cheap reference-check still runs. Conservative:
  # anything that isn't clearly a doc (and every non-diff event, e.g.
  # workflow_dispatch) counts as code and builds everything.
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.detect.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: detect
        shell: bash
        run: |
          set -euo pipefail
          event="${{ github.event_name }}"
          if [ "$event" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          elif [ "$event" = "push" ]; then
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          else
            echo "Non-diff event ($event): building everything."
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # New branch / unknown base (all-zero SHA or missing object): build all.
          if [ "$base" = "0000000000000000000000000000000000000000" ] || \
             ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            echo "Base $base unavailable: building everything."
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          files=$(git diff --name-only "${base}...${head}")
          echo "Changed files:"
          echo "$files"

          if [ -z "$files" ]; then
            echo "Empty diff: building everything (conservative)."
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          docs_only=true
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              *.md) ;;       # markdown anywhere (README, addon docs, docs/*)
              docs/*) ;;     # docs tree: prose, images, and doc tooling
              *)
                echo "Non-doc change -> full build: $f"
                docs_only=false
                break
                ;;
            esac
          done <<< "$files"

          echo "Result: docs_only=$docs_only"
          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"

  build:
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            preset: macos
            launcher: ccache
          # Pinned to 2022: windows-latest now redirects to a VS2026 runner,
          # where projectGenerator's VS-project generation falls back to the
          # "Visual Studio 17 2022" generator and fails (VS2022 absent). Revert
          # to windows-latest once projectGenerator supports VS2026.
          #
          # CI builds examples with the Ninja generator (TRUSSC_CMAKE_GENERATOR)
          # instead of the Visual Studio generator: the compiler-launcher hook
          # sccache relies on is ignored by the VS generator, and Ninja + cl.exe
          # (from vcvars) is version-agnostic anyway. Local dev is unchanged.
          - os: windows-2022
            preset: windows
            launcher: sccache
            cmake_gen: Ninja
          - os: ubuntu-latest
            preset: linux
            launcher: ccache

    runs-on: ${{ matrix.os }}

    env:
      TRUSSC_CMAKE_GENERATOR: ${{ matrix.cmake_gen }}

    steps:
      - uses: actions/checkout@v5

      # Compiler cache: ccache on mac/linux, sccache on Windows/MSVC (Release
      # builds carry no /Zi, so cl objects are cacheable). Wires the compiler
      # launcher into every cmake invocation (trusscli + all examples/tests) via
      # the CMAKE_*_COMPILER_LAUNCHER env vars, which CMake reads at configure
      # time. The action handles install + restore/save + restore-key prefix.
      - name: Setup compiler cache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          variant: ${{ matrix.launcher }}
          key: ${{ matrix.os }}-build
          max-size: 800M

      - name: Enable compiler launcher
        shell: bash
        run: |
          echo "CMAKE_C_COMPILER_LAUNCHER=${{ matrix.launcher }}" >> "$GITHUB_ENV"
          echo "CMAKE_CXX_COMPILER_LAUNCHER=${{ matrix.launcher }}" >> "$GITHUB_ENV"
          # Hash the compiler by content, not mtime: a fresh runner VM installs
          # the same compiler at a different mtime, which otherwise invalidates
          # every restored ccache entry (macOS hit this: 8% hits despite a warm
          # cache). No-op for sccache (ignores CCACHE_*).
          echo "CCACHE_COMPILERCHECK=content" >> "$GITHUB_ENV"

      - name: Cache build directories
        uses: actions/cache@v5
        with:
          path: |
            core/build-${{ matrix.preset }}
            tools/build
          key: ${{ runner.os }}-build-v4-${{ hashFiles('core/**/*.h', 'core/**/*.cpp', 'core/**/*.mm') }}
          restore-keys: |
            ${{ runner.os }}-build-v4-

      # sokol-shdc (shader compiler) is downloaded by core CMake from
      # raw.githubusercontent.com, which 429s anonymous CI traffic. Cache the
      # binary under a static key so runs stop re-downloading it (this also
      # pins the tool — bump the key to pick up a newer upstream build).
      - name: Cache sokol-shdc
        uses: actions/cache@v5
        with:
          path: core/tools/sokol-shdc
          key: sokol-shdc-v1-${{ runner.os }}

      # Linux: Install dependencies using shared script
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          chmod +x tools/install_dependencies_linux.sh
          ./tools/install_dependencies_linux.sh -y

      # Windows: Setup MSVC environment (provides cl.exe, ninja, etc. in PATH)
      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build trusscli
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            sed -i '' 's/read -r -p/#read -r -p/g' tools/build_mac.command
            sed -i '' 's/open /#open /g' tools/build_mac.command
            ./tools/build_mac.command
          elif [ "$RUNNER_OS" == "Linux" ]; then
            chmod +x tools/build_linux.sh
            sed -i 's/read -r -p/#read -r -p/g' tools/build_linux.sh
            sed -i 's|\"$SCRIPT_DIR/trusscli\"|#&|g' tools/build_linux.sh
            ./tools/build_linux.sh
          elif [ "$RUNNER_OS" == "Windows" ]; then
            ./tools/build_win.bat
            echo "Searching for trusscli.exe..."
            find . -name trusscli.exe
          fi

      - name: Build AllFeaturesExample
        shell: bash
        run: |
          chmod +x examples/build_all.py
          ./examples/build_all.py --test-only --verbose

      # Per-addon dependency compile coverage: the first example of every bundled
      # addon. Catches breakage in addons (and their fetched third-party deps)
      # that AllFeaturesExample doesn't link. The exhaustive every-example sweep
      # lives in full-sweep.yml (weekly).
      - name: Build one example per addon
        shell: bash
        run: ./examples/build_all.py --one-per-addon --verbose

      # Behavioral test harnesses bundled with monorepo addons (addons/*/tests/):
      # built AND run (non-zero exit fails the job). The tests are small console
      # projects. No-op when none exist.
      - name: Build & run addon tests
        shell: bash
        run: ./examples/build_all.py --addon-tests-only --verbose

      # Behavioral regression tests for the core (core/tests/*/): built AND run
      # on every build (small headless console projects, non-zero exit fails).
      - name: Build & run core tests
        shell: bash
        run: ./examples/build_all.py --core-tests-only --verbose

      - name: Build HotReloadExample (host/guest split smoke test)
        shell: bash
        run: ./examples/build_all.py --test-hot-reload --verbose

      - name: Compiler cache stats
        if: always()
        shell: bash
        run: |
          if [ "${{ matrix.launcher }}" = "sccache" ]; then
            sccache --show-stats || true
          else
            ccache -s || true
          fi

  build-android:
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup compiler cache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          variant: ccache
          key: android-build
          max-size: 800M

      - name: Enable compiler launcher
        run: |
          echo "CMAKE_C_COMPILER_LAUNCHER=ccache" >> "$GITHUB_ENV"
          echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> "$GITHUB_ENV"
          # Hash the compiler by content, not mtime, so restored entries survive
          # a runner-VM swap (see build job for the macOS symptom).
          echo "CCACHE_COMPILERCHECK=content" >> "$GITHUB_ENV"

      # The NDK shipped with ubuntu-latest runners is too old for sol2's
      # libc++ trait checks (causes "substitution failure" errors when
      # binding usertypes via tcxLua). Pin to r29 to match the local dev
      # baseline and Fumiya's verified setup.
      - name: Set up Android NDK r29
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29

      # Force ANDROID_NDK_HOME to the freshly-installed r29; the runner image
      # pre-sets this env var to its bundled (older) NDK, which otherwise wins
      # over what setup-ndk would export.
      - name: Force ANDROID_NDK_HOME to r29
        run: |
          echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}" >> "$GITHUB_ENV"

      - name: Cache Android build
        uses: actions/cache@v5
        with:
          path: |
            core/build-android
            tools/build
          key: android-build-v4-${{ hashFiles('core/**/*.h', 'core/**/*.cpp') }}
          restore-keys: android-build-v4-

      # See the build job: avoid the 429-prone sokol-shdc download.
      - name: Cache sokol-shdc
        uses: actions/cache@v5
        with:
          path: core/tools/sokol-shdc
          key: sokol-shdc-v1-${{ runner.os }}

      - name: Install Linux dependencies (for trusscli)
        run: |
          chmod +x tools/install_dependencies_linux.sh
          ./tools/install_dependencies_linux.sh -y

      - name: Build trusscli
        run: |
          chmod +x tools/build_linux.sh
          sed -i 's/read -r -p/#read -r -p/g' tools/build_linux.sh
          sed -i 's|\"$SCRIPT_DIR/trusscli\"|#&|g' tools/build_linux.sh
          ./tools/build_linux.sh

      - name: Build AllFeaturesExample (Android)
        run: |
          PG=tools/bin/trusscli
          EXAMPLE=examples/tests/AllFeaturesExample

          # Update project with Android preset
          $PG update -p $EXAMPLE --android

          # Configure and build
          cd $EXAMPLE
          mkdir -p build-android && cd build-android
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build . -- -j$(nproc)

      - name: Compiler cache stats
        if: always()
        run: ccache -s || true

  build-web:
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    timeout-minutes: 120
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup compiler cache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          variant: ccache
          key: web-build
          max-size: 800M

      - name: Enable compiler launcher
        run: |
          echo "CMAKE_C_COMPILER_LAUNCHER=ccache" >> "$GITHUB_ENV"
          echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> "$GITHUB_ENV"
          # Hash the compiler by content, not mtime, so restored entries survive
          # a runner-VM swap (see build job for the macOS symptom).
          echo "CCACHE_COMPILERCHECK=content" >> "$GITHUB_ENV"

      - name: Cache build directories
        uses: actions/cache@v5
        with:
          path: |
            core/build-web
            tools/build
          key: web-build-v3-${{ hashFiles('core/**/*.h', 'core/**/*.cpp') }}
          restore-keys: |
            web-build-v3-

      # See the build job: avoid the 429-prone sokol-shdc download.
      - name: Cache sokol-shdc
        uses: actions/cache@v5
        with:
          path: core/tools/sokol-shdc
          key: sokol-shdc-v1-${{ runner.os }}

      # Pinned: 'latest' let toolchain drift break CI while the repo was
      # unchanged (a newer LLVM turned snappy's -Wpass-failed into an error).
      # Bump deliberately in its own PR.
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: '6.0.2'

      - name: Install Linux dependencies (for trusscli)
        run: |
          chmod +x tools/install_dependencies_linux.sh
          ./tools/install_dependencies_linux.sh -y

      - name: Build trusscli
        run: |
          chmod +x tools/build_linux.sh
          sed -i 's/read -r -p/#read -r -p/g' tools/build_linux.sh
          sed -i 's|\"$SCRIPT_DIR/trusscli\"|#&|g' tools/build_linux.sh
          ./tools/build_linux.sh

      - name: Build AllFeaturesExample (Web)
        run: |
          chmod +x examples/build_all.py
          ./examples/build_all.py --web-only --test-only --verbose

      # See the build job: per-addon dependency compile coverage.
      - name: Build one example per addon (Web)
        run: ./examples/build_all.py --web-only --one-per-addon --verbose

      - name: Compiler cache stats
        if: always()
        run: ccache -s || true

  # Compile-only iOS gate: build one addon-free example against the device SDK
  # with code signing disabled. Catches iOS platform-layer rot at compile time
  # (the tcFileDialog attribute-order break sat undetected for weeks because
  # nothing in CI compiled against the iOS SDK). Runtime behavior is still
  # verified on a real device by hand.
  # videoPlayerExample, not AllFeaturesExample: tcxLua's generated bindings
  # reference the sync dialogs (unavailable on iOS) — the binding generator
  # needs platform awareness before the full example can compile here.
  # No ccache: the Xcode generator ignores CMAKE_<LANG>_COMPILER_LAUNCHER.
  build-ios:
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    timeout-minutes: 60
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      # See the build job: avoid the 429-prone sokol-shdc download.
      - name: Cache sokol-shdc
        uses: actions/cache@v5
        with:
          path: core/tools/sokol-shdc
          key: sokol-shdc-v1-${{ runner.os }}

      - name: Build videoPlayerExample (iOS device SDK, unsigned)
        run: |
          cd examples/video/videoPlayerExample
          cmake -B build-ios -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0
          cmake --build build-ios --config Release -- \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

  # Verify the API reference (docs/reference/) against the real C++ headers.
  # The structure is DERIVED from the clang AST, so signatures can't drift — the
  # old signature-probe is obsolete. check.js instead guards the prose sidecar:
  #   dup    a symbol documented twice            (TOML parse; hard)
  #   orphan a sidecar key with no such symbol    (renamed/removed; hard)
  #   undocumented a public symbol with no prose  (soft report, not a gate yet)
  # structure.js runs the same clang AST dump the probe used (macOS: clang + SDK).
  # Cheap job — always runs, including on docs-only changes (not gated).
  reference-check:
    timeout-minutes: 20
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install doc tooling deps
        run: cd docs && npm ci

      - name: reference check (dup / orphan / 100% documented gate)
        run: node docs/reference/check.js --strict

  # ---------------------------------------------------------------------------
  # Aggregate gate for branch protection. The ruleset requires ONLY this job,
  # so matrix/job renames never break required checks. It fails on any failed,
  # cancelled, or unexpectedly-skipped job; the four heavy build jobs may be
  # skipped only when the `changes` gate declared the diff docs-only.
  # ---------------------------------------------------------------------------
  ci-ok:
    runs-on: ubuntu-latest
    needs: [changes, build, build-android, build-web, build-ios, reference-check]
    if: always()
    steps:
      - name: Verify job results
        env:
          DOCS_ONLY: ${{ needs.changes.outputs.docs_only }}
          R_CHANGES: ${{ needs.changes.result }}
          R_BUILD: ${{ needs.build.result }}
          R_ANDROID: ${{ needs.build-android.result }}
          R_WEB: ${{ needs.build-web.result }}
          R_IOS: ${{ needs.build-ios.result }}
          R_REF: ${{ needs.reference-check.result }}
        run: |
          ok=1
          check() { # name result skippable
            echo "$1: $2"
            case "$2" in
              success) ;;
              skipped) if [ "$3" = "skippable" ] && [ "$DOCS_ONLY" = "true" ]; then
                         echo "  -> skipped by docs-only gate (OK)"
                       else
                         echo "  -> unexpected skip"; ok=0
                       fi ;;
              *) ok=0 ;;
            esac
          }
          check "changes"         "$R_CHANGES"
          check "build"           "$R_BUILD"    skippable
          check "build-android"   "$R_ANDROID"  skippable
          check "build-web"       "$R_WEB"      skippable
          check "build-ios"       "$R_IOS"      skippable
          check "reference-check" "$R_REF"
          [ "$ok" = "1" ] || { echo "ci-ok: FAILING"; exit 1; }
          echo "ci-ok: all good"
